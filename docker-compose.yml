services:
  # Fixes ownership/permissions on bind-mounted config before `web` starts,
  # then exits - doesn't stick around consuming resources. Needed because
  # settings.ini's host-side ownership/perms are whatever they happen to be
  # in prod, not necessarily readable by the image's non-root `app` (uid
  # 1000) user; and settings.ini is mounted :ro in `web` below, so `web`
  # itself could never fix this even if it ran as root - a read-only bind
  # mount blocks writes (including chown/chmod) at the mount level
  # regardless of the process's privileges. Minimal image, not the app
  # image - all it needs is chown/chmod, and 1000:1000 matches the app
  # image's fixed (not auto-assigned) uid/gid - see the Dockerfile.
  init-permissions:
    image: alpine:latest
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - |
        chown 1000:1000 /app/settings.ini
        chmod 640 /app/settings.ini
        chown -R 1000:1000 /app/data
    volumes:
      - app-data:/app/data
      - ./settings.ini:/app/settings.ini
    restart: "no"

  web:
    image: registry.gitlab.com/griffin-web-studio/garage/client-retainer-hours-tracker:latest
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    environment:
      # if you didn't get this reference, change it to a base64-encoded random
      # string of 32 characters
      SECRET_KEY: "Seven of mine... assimilate me... pleeease"
      DEBUG: False
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: db.sqlite3
      # Matches the data volume below - see core/app_settings.py DB_DIR.
      DB_DIR: /app/data
    volumes:
      - app-data:/app/data
      # settings.ini is INI-format business config (branding/hours/auth),
      # not a simple KEY=VALUE env file, so it's bind-mounted rather than
      # passed via env_file. Read-only: the app never writes to it.
      - ./settings.ini:/app/settings.ini:ro
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  app-data:
