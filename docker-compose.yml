services:
  init-permissions:
    image: alpine:latest
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - |
        chown 1000:1000 /app/settings.ini
        chmod 640 /app/settings.ini
        chown -R 1000:1000 /app/data
    volumes:
      - app-data:/app/data
      - ./settings.ini:/app/settings.ini
    restart: "no"

  web:
    image: registry.gitlab.com/griffin-web-studio/garage/client-retainer-hours-tracker:latest
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    environment:
      # if you didn't get this reference, change it to a base64-encoded random
      # string of 32 characters
      SECRET_KEY: "Seven of mine... assimilate me... pleeease"
      DEBUG: False
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: db.sqlite3
      # Matches the data volume below - see core/app_settings.py DB_DIR.
      DB_DIR: /app/data
    volumes:
      - app-data:/app/data
      - ./settings.ini:/app/settings.ini:ro # settings.ini is INI-format business config (branding/hours/auth)
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  app-data:
