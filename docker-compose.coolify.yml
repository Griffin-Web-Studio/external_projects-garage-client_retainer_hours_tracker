services:
  init-permissions:
    image: alpine:latest
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "=== DEBUG init-permissions: running as ==="
        id
        echo "=== DEBUG init-permissions: /app/data BEFORE chown ==="
        ls -la /app/data
        chown -R 1000:1000 /app/data
        echo "=== DEBUG init-permissions: /app/data AFTER chown ==="
        ls -la /app/data
        echo "=== DEBUG init-permissions: /app/settings.ini BEFORE chown ==="
        ls -la /app/settings.ini
        chown 1000:1000 /app/settings.ini
        chmod 640 /app/settings.ini
        echo "=== DEBUG init-permissions: /app/settings.ini AFTER chown ==="
        ls -la /app/settings.ini
        echo "=== DEBUG init-permissions: done ==="
    restart: "no"
    volumes:
      - app-data:/app/data
      - ./settings.ini:/app/settings.ini

  web:
    image: registry.gitlab.com/griffin-web-studio/garage/client-retainer-hours-tracker:latest
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/login/', timeout=3).status == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
    environment:
      SERVICE_FQDN_CRHT_8000:
      # if you didn't get this reference, change it to a base64-encoded random
      # string of 32 characters
      SECRET_KEY: $SERVICE_BASE64_SECRETKEY
      DEBUG: False
      ALLOWED_HOSTS: localhost,127.0.0.1,$SERVICE_FQDN_CRHT
      DB_NAME: db.sqlite3
      # Matches the data volume below - see core/app_settings.py DB_DIR.
      DB_DIR: /app/data
    volumes:
      - app-data:/app/data
      # settings.ini is INI-format business config (branding/hours/auth)
      - type: bind
        source: ./settings.ini
        target: /app/settings.ini
        content: |
          ; RetainerTracker - business configuration
          ;
          ; All values here have in-code fallbacks, so the app starts safely even if a key
          ; is missing - but it is good practice to keep this file explicit.

          [branding]

          ; Name shown in the browser title bar and the sidebar header.
          APP_NAME = RetainerTracker


          [hours]

          ; Number of months in a single contract term.
          ; The end date of a new term is calculated as start_date + term_months.
          TERM_MONTHS = 12

          ; End-of-term conversion ratio.
          ; 1 development hour costs this many support hours.
          ; e.g. with the default of 2: 10 remaining support hours > 5 development hours.
          DEV_CONVERSION_RATIO = 2.0

          ; Maximum support hours that can be migrated directly to a new term
          ; when the client does NOT convert to development hours.
          ; Any remaining hours above this cap are forfeited.
          MAX_MIGRATE_HOURS = 6

          ; Percentage of allocated hours used at which the "low hours" warning appears
          ; on the dashboard and client detail page. Integer, 0-100.
          LOW_HOURS_THRESHOLD = 75


          [auth]

          ; Comma-separated list of email domains permitted to auto-register via OIDC.
          ; Users whose email domain is NOT in this list will be denied on first login.
          ; Leave blank to allow any domain that successfully authenticates through the
          ; configured OIDC provider (not recommended for production).
          ;
          ; Example:
          ;   OIDC_ALLOWED_DOMAINS = yourcompany.io, contractor.com
          OIDC_ALLOWED_DOMAINS =

          ; Create a "Web" application in your OIDC capable IdP, enable PKCE
          ; (no client secret needed), and set the redirect URI
          ; to http://${SERVICE_FQDN_CRHT}/oidc/callback/
          OIDC_CLIENT_ID =                    ; e.g. 123-123-123-123-123
          OIDC_CLIENT_SECRET =                ; leave blank for PKCE-only (public client)
          OIDC_ISSUER =                       ; e.g. https://generic-idp.oidc-provider.tld
          OIDC_LABEL =                        ; e.g. org SSO
